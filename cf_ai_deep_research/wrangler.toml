name = "cf-ai-deep-research"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Workers AI binding — access Llama 3.3 and other models
[ai]
binding = "AI"

# Serve static frontend from /public directory
[assets]
directory = "./public"
binding = "ASSETS"

# Durable Object for persistent chat sessions with memory
[[durable_objects.bindings]]
name = "CHAT_SESSION"
class_name = "ChatSession"

[[migrations]]
tag = "v1"
new_classes = ["ChatSession"]

# Cloudflare Workflow for multi-step research pipeline
[[workflows]]
name = "deep-research-pipeline"
binding = "RESEARCH_WORKFLOW"
class_name = "ResearchWorkflow"
